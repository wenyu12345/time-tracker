# Nginx配置文件 - Excel上传分析系统
# 用于腾讯云服务器部署

server {
    # 监听端口
    listen 80;
    listen [::]:80;
    
    # 服务器名称或IP地址
    server_name 您的域名或IP地址;

    # 访问日志和错误日志
    access_log /var/log/nginx/excel_upload_system_access.log;
    error_log /var/log/nginx/excel_upload_system_error.log;

    # 重定向HTTP到HTTPS（可选，配置SSL后启用）
    # return 301 https://$host$request_uri;

    # 静态文件配置
    location /static/ {
        alias /opt/excel_upload_system/app/static/;
        expires 30d;           # 缓存30天
        add_header Cache-Control "public, max-age=2592000";
        add_header Access-Control-Allow-Origin *;
    }

    # 上传文件配置（仅供内部访问）
    location /uploads/ {
        alias /opt/excel_upload_system/data/uploads/;
        internal;              # 只允许内部访问
    }

    # 健康检查端点
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # 代理到Gunicorn应用服务器
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket支持（如果需要）
        # proxy_http_version 1.1;
        
        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # 缓冲区设置
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
        proxy_busy_buffers_size 64k;
        proxy_temp_file_write_size 64k;
    }

    # 请求限制配置
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;
    location / {
        limit_req zone=mylimit burst=20 nodelay;
    }
}

