<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工艺文件管理 - Version 4.0</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background: #e3f2fd;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            color: #1565c0;
            margin: 0;
            font-size: 28px;
        }
        
        .version-tag {
            background: #1565c0;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #bbdefb;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: #e3f2fd;
            color: #1565c0;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            background: #bbdefb;
        }
        
        .tab-btn.active {
            background: #1565c0;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .card h2 {
            color: #1565c0;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #1565c0;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0d47a1;
        }
        
        .btn-success {
            background: #2e7d32;
            color: white;
        }
        
        .btn-success:hover {
            background: #1b5e20;
        }
        
        .btn-warning {
            background: #f57c00;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e65100;
        }
        
        .btn-danger {
            background: #c62828;
            color: white;
        }
        
        .btn-danger:hover {
            background: #b71c1c;
        }
        
        .btn-secondary {
            background: #546e7a;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #37474f;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #1565c0;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #1565c0;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1565c0;
        }
        
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #bbdefb;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e3f2fd;
            white-space: nowrap;
            writing-mode: horizontal-tb;
        }
        
        th {
            background: #bbdefb;
            color: #1565c0;
            font-weight: bold;
            position: sticky;
            top: 0;
            cursor: pointer;
            writing-mode: horizontal-tb !important;
            text-orientation: mixed;
            white-space: nowrap;
            word-wrap: normal;
        }
        
        th:hover {
            background: #90caf9;
        }
        
        tr:hover {
            background: #f5f9ff;
        }
        
        td {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .field-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f5f9ff;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: move;
        }
        
        .field-item:hover {
            background: #e3f2fd;
        }
        
        .field-item.dragging {
            opacity: 0.5;
        }
        
        .field-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .field-actions {
            display: flex;
            gap: 8px;
        }
        
        .drag-handle {
            cursor: move;
            color: #666;
            font-size: 20px;
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            border-radius: 26px;
            transition: 0.3s;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        
        input:checked + .toggle-slider {
            background-color: #1565c0;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            margin: 0;
            color: #1565c0;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        .detail-section {
            margin-bottom: 12px;
        }

        .detail-section h3 {
            color: #1565c0;
            font-size: 14px;
            margin: 0 0 6px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #e3f2fd;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 4px 12px;
            font-size: 14px;
        }

        .detail-label {
            color: #666;
            font-weight: bold;
            text-align: right;
        }

        .detail-value {
            color: #333;
            word-break: break-all;
        }

        .detail-textarea {
            width: 100%;
            min-height: 500px;
            padding: 16px;
            border: 2px solid #bbdefb;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: vertical;
            background: #fafafa;
        }

        .detail-textarea:focus {
            outline: none;
            border-color: #1565c0;
        }

        .seq-clickable {
            cursor: pointer;
            transition: all 0.2s;
        }

        .seq-clickable:hover {
            background: #bbdefb !important;
            border-radius: 4px;
            transform: scale(1.1);
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        
        .alert.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        
        .alert.show {
            display: block;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #1565c0;
        }
        
        .selected-count {
            margin-left: 10px;
            color: #666;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            th, td {
                padding: 8px 10px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 工艺文件管理</h1>
            <span class="version-tag">Version 4.0</span>
            <a href="/" class="btn btn-secondary">← 返回主页</a>
        </div>
        
        <div class="alert" id="alert"></div>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="records">📊 记录管理</button>
            <button class="tab-btn" data-tab="fields">⚙️ 字段配置</button>
        </div>
        
        <!-- 记录管理 Tab -->
        <div class="tab-content active" id="records-tab">
            <div class="card">
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="openAddModal()">➕ 添加记录</button>
                    <button class="btn btn-success" onclick="exportRecords()">📥 导出Excel</button>
                    <button class="btn btn-warning" onclick="shareToDingTalk()">📤 分享到钉钉</button>
                    <button class="btn btn-danger" onclick="batchDelete()" id="batchDeleteBtn" style="display: none;">🗑️ 批量删除</button>
                </div>
                
                <div class="btn-group">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="🔍 搜索所有字段..." onkeyup="searchRecords()">
                    </div>
                    <button class="btn btn-secondary" onclick="toggleFilters()" id="toggleFilterBtn">🔽 显示筛选器</button>
                    <button class="btn btn-secondary" onclick="clearFilters()" id="clearFilterBtn" style="display: none;">🗑️ 清除筛选</button>
                </div>

                <!-- 筛选器区域 -->
                <div id="filtersContainer" style="display: none; margin-bottom: 20px;">
                    <div class="card" style="background: #f5f9ff; margin-bottom: 0; padding: 15px;">
                        <h3 style="margin-top: 0; color: #1565c0; font-size: 18px;">📋 高级筛选</h3>
                        <div id="filtersGrid" class="form-row" style="margin-bottom: 10px;"></div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="applyFilters()">✅ 应用筛选</button>
                            <button class="btn btn-secondary" onclick="clearFilters()">🗑️ 清除</button>
                        </div>
                    </div>
                </div>
                
                <div class="table-container">
                    <table id="recordsTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                
                <div style="margin-top: 15px; color: #666;" id="totalCount">共 0 条记录</div>
            </div>
        </div>
        
        <!-- 字段配置 Tab -->
        <div class="tab-content" id="fields-tab">
            <div class="card">
                <h2>字段配置</h2>
                <div class="btn-group" style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddFieldModal()">➕ 添加自定义字段</button>
                </div>
                <div id="fieldsList"></div>
                <p style="color: #666; margin-top: 20px;">💡 提示：拖拽可调整字段顺序，开关控制字段显示，默认字段无法删除</p>
            </div>
            <div class="card" style="margin-top: 20px;">
                <h2>🎨 详情弹窗配置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>弹窗宽度 (px)</label>
                        <input type="number" id="cfgModalWidth" min="400" max="1200" step="50" style="width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>文本框高度 (px)</label>
                        <input type="number" id="cfgTextareaHeight" min="200" max="1000" step="50" style="width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 8px;">
                    </div>
                    <div class="form-group">
                        <label>字体大小 (px)</label>
                        <input type="number" id="cfgFontSize" min="10" max="24" step="1" style="width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 8px;">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveUiSettings()">💾 保存配置</button>
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑记录 Modal -->
    <div class="modal" id="recordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加记录</h2>
                <button class="close-btn" onclick="closeModal('recordModal')">&times;</button>
            </div>
            <form id="recordForm" onsubmit="saveRecord(event)">
                <div class="form-row" id="modalFields"></div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 保存</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('recordModal')">取消</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 记录详情 Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2 id="detailTitle">📄 记录详情</h2>
                <button class="close-btn" onclick="closeModal('detailModal')">&times;</button>
            </div>
            <div style="margin-bottom: 15px;">
                <textarea class="detail-textarea" id="detailContent" readonly></textarea>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn btn-secondary btn-sm" onclick="copyDetailContent()">📋 复制内容</button>
                <button class="btn btn-secondary" onclick="closeModal('detailModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 添加字段 Modal -->
    <div class="modal" id="fieldModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加自定义字段</h2>
                <button class="close-btn" onclick="closeModal('fieldModal')">&times;</button>
            </div>
            <form id="fieldForm" onsubmit="addField(event)">
                <div class="form-group">
                    <label>字段Key（英文）</label>
                    <input type="text" id="fieldKey" required placeholder="例如：temperature">
                </div>
                <div class="form-group">
                    <label>字段标签（中文）</label>
                    <input type="text" id="fieldLabel" required placeholder="例如：温度">
                </div>
                <div class="form-group">
                    <label>字段类型</label>
                    <select id="fieldType">
                        <option value="text">文本</option>
                        <option value="number">数字</option>
                        <option value="date">日期</option>
                    </select>
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" id="fieldRequired">
                    <label for="fieldRequired">必填字段</label>
                </div>
                <div class="btn-group" style="margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 添加</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('fieldModal')">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let allFields = [];
        let visibleFields = [];
        let records = [];
        let editingId = null;
        let selectedIds = new Set();
        let currentSort = { field: 'created_at', order: 'desc' };
        let uiSettings = {
            detail_modal_width: 800,
            detail_textarea_height: 500,
            detail_font_size: 14
        };
        let currentFilters = {}; // 存储当前筛选条件
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadFields();
            loadRecords();
            
            // Tab切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tab = this.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(tab + '-tab').classList.add('active');
                });
            });
        });
        
        // 显示提示消息
        function showAlert(message, type = 'success') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type + ' show';
            setTimeout(() => alert.classList.remove('show'), 3000);
        }
        
        // 加载字段
        async function loadFields() {
            try {
                const res = await fetch('/process_files/api/fields');
                const data = await res.json();
                if (data.success) {
                    allFields = data.data.all_fields;
                    visibleFields = data.data.visible_fields;
                    if (data.data.ui_settings) {
                        uiSettings = data.data.ui_settings;
                    }
                    renderTableHeader();
                    renderFieldsList();
                    renderUiSettingsForm();
                    renderFilters(); // 渲染筛选器
                }
            } catch (e) {
                console.error(e);
                showAlert('加载字段失败', 'error');
            }
        }
        
        // 渲染表格头部
        function renderTableHeader() {
            const thead = document.getElementById('tableHead');
            let html = '<tr>';
            html += '<th style="width: 50px;"><input type="checkbox" onchange="toggleSelectAll(this)"></th>';
            html += '<th onclick="sortBy(\'seq\')" style="width: 80px;">序号 <span>↕</span></th>';
            visibleFields.forEach(field => {
                html += `<th onclick="sortBy('${field.key}')">${field.label} <span>↕</span></th>`;
            });
            html += '<th style="width: 150px;">操作</th>';
            html += '</tr>';
            thead.innerHTML = html;
            renderTableBody();
        }
        
        // 渲染表格内容
        function renderTableBody() {
            const tbody = document.getElementById('tableBody');
            document.getElementById('totalCount').textContent = `共 ${records.length} 条记录`;
            
            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${visibleFields.length + 3}" style="text-align: center; padding: 40px; color: #666;">暂无数据，请点击"添加记录"</td></tr>`;
                return;
            }
            
            let html = '';
            records.forEach((record, index) => {
                html += '<tr>';
                html += `<td><input type="checkbox" onchange="toggleSelect('${record.id}', this.checked)" ${selectedIds.has(record.id) ? 'checked' : ''}></td>`;
                html += `<td class="seq-clickable" style="text-align: center; font-weight: bold; color: #1565c0;" onclick="showRecordDetail('${record.id}')" title="点击查看完整信息">${index + 1}</td>`;
                visibleFields.forEach(field => {
                    const value = record[field.key] || '';
                    if (field.options) {
                        html += `<td>
                            <select class="inline-edit" data-record-id="${record.id}" data-field="${field.key}" onchange="updateField('${record.id}', '${field.key}', this.value)" style="width: 100%; padding: 6px; border: 2px solid #bbdefb; border-radius: 6px;">
                                <option value="">请选择</option>
                                ${field.options.map(opt => `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                            </select>
                        </td>`;
                    } else {
                        html += `<td>
                            <input type="text" class="inline-edit" data-record-id="${record.id}" data-field="${field.key}" value="${value}" 
                                   onblur="updateField('${record.id}', '${field.key}', this.value)" 
                                   onkeydown="if(event.key==='Enter'){this.blur();}"
                                   style="width: 100%; padding: 6px; border: 2px solid #bbdefb; border-radius: 6px; background: white;"
                                   title="按Enter键保存或点击其他位置保存">
                        </td>`;
                    }
                });
                html += `<td>
                    <button class="btn btn-danger btn-sm" onclick="deleteRecord('${record.id}')">删除</button>
                </td>`;
                html += '</tr>';
            });
            tbody.innerHTML = html;
            
            updateBatchDeleteBtn();
        }
        
        // 渲染字段列表
        function renderFieldsList() {
            const container = document.getElementById('fieldsList');
            let html = '';
            
            allFields.forEach((field, index) => {
                const isDefault = ['model', 'test_type', 'electrode_type', 'roll1_thickness', 'roll2_thickness', 
                    'roll1_gap_operate', 'roll1_gap_drive', 'roll1_pressure_operate', 'roll1_pressure_drive',
                    'roll2_gap_operate', 'roll2_gap_drive', 'roll2_pressure_operate', 'roll2_pressure_drive'].includes(field.key);
                
                html += `<div class="field-item" draggable="true" data-key="${field.key}" data-order="${index + 1}" ondragstart="dragStart(event)" ondragend="dragEnd(event)" ondragover="dragOver(event)" ondrop="drop(event)">
                    <div class="field-info">
                        <span class="drag-handle">⋮⋮</span>
                        <span style="background: #1565c0; color: white; padding: 2px 8px; border-radius: 50%; font-weight: bold; font-size: 13px;">${index + 1}</span>
                        <span><strong>${field.label}</strong></span>
                    </div>
                    <div class="field-actions">
                        <label class="toggle-switch">
                            <input type="checkbox" ${field.visible ? 'checked' : ''} onchange="toggleFieldVisibility('${field.key}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                        ${!isDefault ? `<button class="btn btn-danger btn-sm" onclick="deleteField('${field.key}')">删除</button>` : ''}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
        
        // 拖拽相关
        let draggedKey = null;
        
        function dragStart(e) {
            draggedKey = e.target.closest('.field-item').dataset.key;
            e.target.closest('.field-item').classList.add('dragging');
        }
        
        function dragEnd(e) {
            const item = e.target.closest('.field-item');
            if (item) item.classList.remove('dragging');
            draggedKey = null;
        }
        
        function dragOver(e) {
            e.preventDefault();
            const draggingItem = document.querySelector('.field-item.dragging');
            if (!draggingItem) return;
            
            const afterElement = getDragAfterElement(e.clientY);
            const container = document.getElementById('fieldsList');
            
            if (afterElement == null) {
                container.appendChild(draggingItem);
            } else {
                container.insertBefore(draggingItem, afterElement);
            }
        }
        
        function getDragAfterElement(y) {
            const fieldItems = document.querySelectorAll('.field-item:not(.dragging)');
            
            let closest = null;
            let closestOffset = Infinity;
            
            fieldItems.forEach(item => {
                const box = item.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > -closestOffset) {
                    closest = item;
                    closestOffset = -offset;
                }
            });
            
            return closest;
        }
        
        async function drop(e) {
            e.preventDefault();
            
            if (!draggedKey) return;
            
            const fieldItems = Array.from(document.querySelectorAll('.field-item'));
            const newOrder = fieldItems.map(item => item.dataset.key);
            
            await updateFieldOrder(newOrder);
        }
        
        async function updateFieldOrder(fieldKeys) {
            try {
                const res = await fetch('/process_files/api/fields/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ field_keys: fieldKeys })
                });
                const data = await res.json();
                if (data.success) {
                    await loadFields();
                    showAlert('排序已更新');
                }
            } catch (e) {
                console.error(e);
                showAlert('更新排序失败', 'error');
            }
        }
        
        async function toggleFieldVisibility(fieldKey, visible) {
            try {
                const res = await fetch('/process_files/api/fields/visibility', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ field_key: fieldKey, visible: visible })
                });
                const data = await res.json();
                if (data.success) {
                    await loadFields();
                    showAlert('字段显示已更新');
                }
            } catch (e) {
                console.error(e);
                showAlert('更新失败', 'error');
            }
        }
        
        function openAddFieldModal() {
            document.getElementById('fieldKey').value = '';
            document.getElementById('fieldLabel').value = '';
            document.getElementById('fieldType').value = 'text';
            document.getElementById('fieldRequired').checked = false;
            document.getElementById('fieldModal').classList.add('active');
        }
        
        async function addField(e) {
            e.preventDefault();
            try {
                const res = await fetch('/process_files/api/fields', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        key: document.getElementById('fieldKey').value,
                        label: document.getElementById('fieldLabel').value,
                        type: document.getElementById('fieldType').value,
                        required: document.getElementById('fieldRequired').checked
                    })
                });
                const data = await res.json();
                if (data.success) {
                    closeModal('fieldModal');
                    await loadFields();
                    showAlert('字段添加成功');
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('添加失败', 'error');
            }
        }
        
        async function deleteField(fieldKey) {
            if (!confirm('确定要删除此字段吗？')) return;
            try {
                const res = await fetch(`/process_files/api/fields/${fieldKey}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    await loadFields();
                    showAlert('字段已删除');
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('删除失败', 'error');
            }
        }
        
        async function loadRecords() {
            try {
                // 构建查询参数
                const params = new URLSearchParams();
                params.set('sort_by', currentSort.field);
                params.set('sort_order', currentSort.order);
                
                // 添加搜索参数
                const search = document.getElementById('searchInput').value.trim();
                if (search) {
                    params.set('search', search);
                }
                
                // 添加筛选参数
                if (Object.keys(currentFilters).length > 0) {
                    params.set('filters', JSON.stringify(currentFilters));
                }
                
                const res = await fetch(`/process_files/api/records?${params.toString()}`);
                const data = await res.json();
                if (data.success) {
                    records = data.data;
                    renderTableBody();
                }
            } catch (e) {
                console.error(e);
                showAlert('加载记录失败', 'error');
            }
        }
        
        function sortBy(field) {
            if (currentSort.field === field) {
                currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.order = 'asc'; // 序号默认升序
            }
            loadRecords();
        }
        
        function searchRecords() {
            // 使用防抖，避免频繁请求
            clearTimeout(searchRecords.timer);
            searchRecords.timer = setTimeout(() => {
                loadRecords();
            }, 300);
        }
        
        function toggleSelectAll(checkbox) {
            if (checkbox.checked) {
                records.forEach(r => selectedIds.add(r.id));
            } else {
                selectedIds.clear();
            }
            renderTableBody();
        }
        
        function toggleSelect(id, checked) {
            if (checked) {
                selectedIds.add(id);
            } else {
                selectedIds.delete(id);
            }
            updateBatchDeleteBtn();
        }
        
        function updateBatchDeleteBtn() {
            const btn = document.getElementById('batchDeleteBtn');
            if (selectedIds.size > 0) {
                btn.style.display = 'inline-flex';
                btn.innerHTML = `🗑️ 批量删除 (${selectedIds.size})`;
            } else {
                btn.style.display = 'none';
            }
        }
        
        async function updateField(recordId, fieldKey, value) {
            try {
                const res = await fetch(`/process_files/api/records/${recordId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [fieldKey]: value })
                });
                const data = await res.json();
                if (data.success) {
                    // 更新本地记录
                    const record = records.find(r => r.id === recordId);
                    if (record) {
                        record[fieldKey] = value;
                    }
                    showAlert('字段已保存');
                } else {
                    showAlert(data.error, 'error');
                    loadRecords(); // 重新加载以恢复原值
                }
            } catch (e) {
                console.error(e);
                showAlert('保存失败', 'error');
                loadRecords(); // 重新加载以恢复原值
            }
        }
        
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加记录';
            renderModalFields();
            document.getElementById('recordModal').classList.add('active');
        }
        
        function openEditModal(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑记录';
            renderModalFields(record);
            document.getElementById('recordModal').classList.add('active');
        }
        
        function renderModalFields(record = {}) {
            const container = document.getElementById('modalFields');
            let html = '';
            
            allFields.forEach(field => {
                const value = record[field.key] || '';
                if (field.options) {
                    html += `<div class="form-group">
                        <label>${field.label}${field.required ? ' *' : ''}</label>
                        <select id="field_${field.key}">
                            <option value="">请选择</option>
                            ${field.options.map(opt => `<option value="${opt}" ${value === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </div>`;
                } else {
                    html += `<div class="form-group">
                        <label>${field.label}${field.required ? ' *' : ''}</label>
                        <input type="text" id="field_${field.key}" value="${value}">
                    </div>`;
                }
            });
            container.innerHTML = html;
        }
        
        async function saveRecord(e) {
            e.preventDefault();
            
            const formData = {};
            allFields.forEach(field => {
                const el = document.getElementById('field_' + field.key);
                formData[field.key] = el ? el.value : '';
            });
            
            try {
                const url = editingId ? `/process_files/api/records/${editingId}` : '/process_files/api/records';
                const method = editingId ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                
                if (data.success) {
                    closeModal('recordModal');
                    await loadRecords();
                    showAlert(editingId ? '记录已更新' : '记录已添加');
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('保存失败', 'error');
            }
        }
        
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            try {
                const res = await fetch(`/process_files/api/records/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    await loadRecords();
                    showAlert('记录已删除');
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('删除失败', 'error');
            }
        }
        
        async function batchDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm(`确定要删除选中的 ${selectedIds.size} 条记录吗？`)) return;
            
            try {
                const res = await fetch('/process_files/api/records/batch', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ record_ids: Array.from(selectedIds) })
                });
                const data = await res.json();
                if (data.success) {
                    selectedIds.clear();
                    await loadRecords();
                    showAlert(data.message);
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('批量删除失败', 'error');
            }
        }
        
        async function exportRecords() {
            try {
                const res = await fetch('/process_files/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ record_ids: selectedIds.size > 0 ? Array.from(selectedIds) : null })
                });
                
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const header = res.headers.get('Content-Disposition');
                    let filename = '工艺文件.xlsx';
                    if (header) {
                        const match = header.match(/filename="(.+)"/);
                        if (match) filename = match[1];
                    }
                    a.download = filename;
                    a.click();
                    window.URL.revokeObjectURL(url);
                    showAlert('导出成功');
                }
            } catch (e) {
                console.error(e);
                showAlert('导出失败', 'error');
            }
        }
        
        async function shareToDingTalk() {
            // 确定要分享的数据
            let tableData = records;
            let operation = '工艺文件分享 - 全部数据';
            
            // 如果有选中的记录，只分享选中的
            if (selectedIds.size > 0) {
                tableData = records.filter(r => selectedIds.has(r.id));
                operation = `工艺文件分享 - 已选择 ${selectedIds.size} 条`;
            }
            
            if (tableData.length === 0) {
                showAlert('没有数据可分享', 'error');
                return;
            }
            
            if (!confirm(`确定要分享 ${tableData.length} 条记录到钉钉吗？`)) {
                return;
            }
            
            try {
                const res = await fetch('/process_files/api/share_to_dingtalk', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        table_data: tableData,
                        operation: operation
                    })
                });
                
                const result = await res.json();
                
                if (result.errcode === 0) {
                    showAlert('分享到钉钉成功！');
                } else {
                    showAlert('分享失败: ' + (result.errmsg || '未知错误'), 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('分享失败', 'error');
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function renderUiSettingsForm() {
            document.getElementById('cfgModalWidth').value = uiSettings.detail_modal_width || 800;
            document.getElementById('cfgTextareaHeight').value = uiSettings.detail_textarea_height || 500;
            document.getElementById('cfgFontSize').value = uiSettings.detail_font_size || 14;
        }

        async function saveUiSettings() {
            const settings = {
                detail_modal_width: parseInt(document.getElementById('cfgModalWidth').value) || 800,
                detail_textarea_height: parseInt(document.getElementById('cfgTextareaHeight').value) || 500,
                detail_font_size: parseInt(document.getElementById('cfgFontSize').value) || 14
            };
            uiSettings = settings;
            try {
                const res = await fetch('/process_files/api/ui_settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('UI配置已保存');
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('保存UI配置失败', 'error');
            }
        }

        async function showRecordDetail(recordId) {
            try {
                const res = await fetch(`/process_files/api/records/${recordId}`);
                const data = await res.json();
                if (data.success) {
                    const record = data.data;
                    const lines = [];
                    lines.push('═══════════════════════════════════');
                    lines.push('  工 艺 文 件 完 整 信 息');
                    lines.push('═══════════════════════════════════');
                    lines.push('');
                    lines.push(`记录ID: ${record.id}`);
                    lines.push(`创建时间: ${record.created_at || '-'}`);
                    lines.push(`更新时间: ${record.updated_at || '-'}`);
                    lines.push('───────────────────────────────────');
                    lines.push('');
                    allFields.forEach(field => {
                        const value = record[field.key] || '(空)';
                        lines.push(`${field.label}(${field.key}): ${value}`);
                    });
                    lines.push('');
                    lines.push('═══════════════════════════════════');

                    const modalContent = document.querySelector('#detailModal .modal-content');
                    const textarea = document.getElementById('detailContent');

                    modalContent.style.maxWidth = (uiSettings.detail_modal_width || 800) + 'px';
                    textarea.style.minHeight = (uiSettings.detail_textarea_height || 500) + 'px';
                    textarea.style.fontSize = (uiSettings.detail_font_size || 14) + 'px';
                    textarea.value = lines.join('\n');

                    document.getElementById('detailModal').classList.add('active');
                } else {
                    showAlert('获取记录详情失败', 'error');
                }
            } catch (e) {
                console.error(e);
                showAlert('获取记录详情失败', 'error');
            }
        }

        function copyDetailContent() {
            const textarea = document.getElementById('detailContent');
            textarea.select();
            document.execCommand('copy');
            showAlert('内容已复制到剪贴板');
        }

        // ========== 筛选器功能 ==========

        function renderFilters() {
            const container = document.getElementById('filtersGrid');
            let html = '';
            
            visibleFields.forEach(field => {
                const key = field.key;
                const label = field.label;
                const currentValue = currentFilters[key] || '';
                
                if (field.options) {
                    // 有选项的字段使用下拉框
                    html += `
                        <div class="form-group">
                            <label>${label}</label>
                            <select id="filter_${key}" class="form-control" style="width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 8px;">
                                <option value="">全部</option>
                                ${field.options.map(opt => `<option value="${opt}" ${currentValue === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                            </select>
                        </div>
                    `;
                } else {
                    // 文本字段使用输入框
                    html += `
                        <div class="form-group">
                            <label>${label}</label>
                            <input type="text" id="filter_${key}" value="${currentValue}" placeholder="输入${label}..." 
                                   style="width: 100%; padding: 10px; border: 2px solid #bbdefb; border-radius: 8px;">
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html;
        }

        function toggleFilters() {
            const container = document.getElementById('filtersContainer');
            const btn = document.getElementById('toggleFilterBtn');
            
            if (container.style.display === 'none') {
                container.style.display = 'block';
                btn.textContent = '🔼 隐藏筛选器';
            } else {
                container.style.display = 'none';
                btn.textContent = '🔽 显示筛选器';
            }
        }

        async function applyFilters() {
            // 收集筛选条件
            const newFilters = {};
            visibleFields.forEach(field => {
                const key = field.key;
                const el = document.getElementById(`filter_${key}`);
                if (el && el.value.trim()) {
                    newFilters[key] = el.value.trim();
                }
            });
            
            currentFilters = newFilters;
            
            // 更新UI状态
            document.getElementById('clearFilterBtn').style.display = 
                Object.keys(currentFilters).length > 0 ? 'inline-flex' : 'none';
            
            // 加载筛选后的数据
            await loadRecords();
            showAlert('筛选已应用', 'success');
        }

        async function clearFilters() {
            currentFilters = {};
            
            // 清空输入框
            visibleFields.forEach(field => {
                const el = document.getElementById(`filter_${field.key}`);
                if (el) {
                    el.value = '';
                }
            });
            
            // 隐藏清除按钮
            document.getElementById('clearFilterBtn').style.display = 'none';
            
            // 重新加载数据
            await loadRecords();
            showAlert('筛选已清除', 'success');
        }

        // ========== 筛选器功能结束 ==========
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
