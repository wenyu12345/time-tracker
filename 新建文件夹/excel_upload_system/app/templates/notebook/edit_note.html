{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">📝 编辑笔记</h4>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger mb-4">
                        {{ error }}
                    </div>
                    {% endif %}
                    
                    <form method="POST">
                        <div class="form-group">
                            <label for="title"><strong>笔记标题</strong></label>
                            <input type="text" class="form-control" id="title" name="title" 
                                   value="{{ note.title }}" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="content"><strong>笔记内容</strong></label>
                            <div class="mb-2">
                                <!-- AI辅助功能按钮组 -->
                                <div class="btn-group" role="group">
                                    <button type="button" class="btn btn-outline-info btn-sm" id="btn-ai-generate">
                                        <i class="fas fa-magic"></i> AI生成
                                    </button>
                                    <button type="button" class="btn btn-outline-success btn-sm" id="btn-ai-suggest-tags">
                                        <i class="fas fa-tags"></i> 推荐标签
                                    </button>
                                    <button type="button" class="btn btn-outline-warning btn-sm" id="btn-ai-optimize">
                                        <i class="fas fa-wrench"></i> 优化内容
                                    </button>
                                </div>
                            </div>
                            <textarea class="form-control" id="content" name="content" rows="15">
                                {{ note.content_text }}
                            </textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="tags"><strong>标签</strong></label>
                            <input type="text" class="form-control" id="tags" name="tags" 
                                   value="{{ note.tags_str }}">
                        </div>
                        
                        <div class="mt-4 d-flex justify-content-between">
                            <div>
                                <small class="text-muted">
                                    创建时间: {{ note.created_at_formatted or note.created_at }}<br>
                                    更新时间: {{ note.updated_at_formatted or note.updated_at }}
                                </small>
                            </div>
                            <div>
                                <a href="{{ url_for('notebook.notes_list') }}" class="btn btn-secondary mr-2">
                                    返回
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    保存修改
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    // 去除文本域自动添加的空白
    $('#content').val($('#content').val().trim());
    
    // AI生成内容
    $('#btn-ai-generate').click(function() {
        const prompt = prompt('请输入您希望AI生成内容的提示词：');
        if (prompt) {
            $(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 生成中...');
            
            $.ajax({
                url: '{{ url_for('notebook.ai_generate') }}',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ prompt: prompt, type: 'general' }),
                success: function(response) {
                    if (response.success) {
                        // 插入到光标位置
                        const textarea = document.getElementById('content');
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        const text = textarea.value;
                        textarea.value = text.substring(0, start) + response.result + text.substring(end);
                        
                        // 设置光标位置
                        textarea.selectionStart = textarea.selectionEnd = start + response.result.length;
                        textarea.focus();
                    } else {
                        alert('生成失败: ' + (response.error || '请检查AI服务配置'));
                    }
                },
                error: function() {
                    alert('请求失败，请稍后重试');
                },
                complete: function() {
                    $('#btn-ai-generate').prop('disabled', false).html('<i class="fas fa-magic"></i> AI生成');
                }
            });
        }
    });
    
    // AI推荐标签
    $('#btn-ai-suggest-tags').click(function() {
        const content = $('#content').val();
        if (!content.trim()) {
            alert('请先输入笔记内容');
            return;
        }
        
        $(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 分析中...');
        
        $.ajax({
            url: '{{ url_for('notebook.ai_generate') }}',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ prompt: content, type: 'suggest_tags' }),
            success: function(response) {
                if (response.success && response.result && response.result.length > 0) {
                    const currentTags = $('#tags').val();
                    const newTags = response.result.join(', ');
                    $('#tags').val(currentTags ? `${currentTags}, ${newTags}` : newTags);
                } else {
                    alert('标签推荐失败: ' + (response.error || '请检查AI服务配置'));
                }
            },
            error: function() {
                alert('请求失败，请稍后重试');
            },
            complete: function() {
                $('#btn-ai-suggest-tags').prop('disabled', false).html('<i class="fas fa-tags"></i> 推荐标签');
            }
        });
    });
    
    // AI优化内容
    $('#btn-ai-optimize').click(function() {
        const content = $('#content').val();
        if (!content.trim()) {
            alert('请先输入笔记内容');
            return;
        }
        
        $(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> 优化中...');
        
        $.ajax({
            url: '{{ url_for('notebook.ai_generate') }}',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ prompt: content, type: 'optimize_text' }),
            success: function(response) {
                if (response.success) {
                    if (confirm('优化完成，是否替换当前内容？')) {
                        $('#content').val(response.result);
                    }
                } else {
                    alert('内容优化失败: ' + (response.error || '请检查AI服务配置'));
                }
            },
            error: function() {
                alert('请求失败，请稍后重试');
            },
            complete: function() {
                $('#btn-ai-optimize').prop('disabled', false).html('<i class="fas fa-wrench"></i> 优化内容');
            }
        });
    });
});
</script>
{% endblock %}
