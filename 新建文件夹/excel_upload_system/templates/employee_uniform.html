<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工工装管理系统</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        /* 自定义样式 */
        .card {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .uniform-type-card {
            border-left: 4px solid #0d6efd;
        }
        .history-record {
            border-left: 4px solid #198754;
        }
        .btn-sm {
            margin-right: 5px;
        }
        .table th, .table td {
            vertical-align: middle;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        /* 选项卡样式 */
        .nav-tabs .nav-link.active {
            background-color: #fff;
            border-bottom: 1px solid #fff;
            color: #495057;
        }
        .tab-content {
            border: 1px solid #dee2e6;
            border-top: none;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid" id="employee-uniform-container">
        <div class="row mt-4">
            <div class="col-12">
                <h2 class="mb-4">员工工装管理系统</h2>
                
                <!-- 选项卡导航 -->
                <ul class="nav nav-tabs" id="uniformTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="management-tab" data-bs-toggle="tab" data-bs-target="#management" type="button" role="tab">工装管理</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="summary-tab" data-bs-toggle="tab" data-bs-target="#summary" type="button" role="tab">汇总信息</button>
                    </li>
                </ul>
                
                <!-- 选项卡内容 -->
                <div class="tab-content" id="uniformTabContent">
                    <!-- 工装管理选项卡 -->
                    <div class="tab-pane fade show active" id="management" role="tabpanel">
                        <!-- 员工管理卡片 -->
                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title mb-0">员工管理</h3>
                                <button id="add-employee-btn" class="btn btn-primary">
                                    <i class="bi bi-plus"></i> 添加员工
                                </button>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead class="table-light">
                                            <tr>
                                                <th>工号</th>
                                                <th>姓名</th>
                                                <th>添加时间</th>
                                                <th>操作</th>
                                                <th>删除</th>
                                            </tr>
                                        </thead>
                                        <tbody id="employees-table-body">
                                            <!-- 员工数据将通过JavaScript动态加载 -->
                                            <tr>
                                                <td colspan="5" class="text-center">加载中...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 工装管理卡片 -->
                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title mb-0">工装管理</h3>
                                <button id="add-uniform-type-btn" class="btn btn-primary">
                                    <i class="bi bi-plus"></i> 添加工装类型
                                </button>
                            </div>
                            <div class="card-body">
                                <h4 class="mb-3">工装类型列表</h4>
                                <div id="uniform-types-list">
                                    <!-- 工装类型将通过JavaScript动态加载 -->
                                    <p class="text-center">加载中...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 汇总信息选项卡 -->
                    <div class="tab-pane fade" id="summary" role="tabpanel">
                        <div class="mt-4">
                            <h3>汇总信息</h3>
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>工号</th>
                                        <th>姓名</th>
                                        <th>今年领总套数</th>
                                        <th>距离上次领取天数</th>
                                    </tr>
                                </thead>
                                <tbody id="uniform-summary-body">
                                    <!-- 汇总信息将在这里动态加载 -->
                                    <tr>
                                        <td colspan="4" class="text-center">加载中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 添加员工模态框 -->
    <div class="modal fade" id="add-employee-modal" tabindex="-1" aria-labelledby="addEmployeeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addEmployeeModalLabel">添加新员工</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="add-employee-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="employee-name" class="form-label">员工姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="employee-name" placeholder="请输入员工姓名" required>
                        </div>
                        <div class="mb-3">
                            <label for="employee-id" class="form-label">员工工号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="employee-id" placeholder="请输入员工工号" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        <button type="submit" class="btn btn-primary">确定添加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 发放工装模态框 -->
    <div class="modal fade" id="issue-uniform-modal" tabindex="-1" aria-labelledby="issueUniformModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="issueUniformModalLabel">发放工装</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="issue-uniform-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">员工信息</label>
                            <p id="issue-employee-info" class="form-control-plaintext text-primary"></p>
                            <input type="hidden" id="issue-employee-id">
                        </div>
                        <div class="mb-3">
                            <label for="uniform-type-select" class="form-label">工装类型 <span class="text-danger">*</span></label>
                            <select class="form-select" id="uniform-type-select" required>
                                <option value="" selected disabled>请选择工装类型</option>
                                <!-- 工装类型将通过JavaScript动态加载 -->
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="issue-date" class="form-label">发放日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="issue-date" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        <button type="submit" class="btn btn-primary">确认发放</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 添加工装类型模态框 -->
    <div class="modal fade" id="add-uniform-type-modal" tabindex="-1" aria-labelledby="addUniformTypeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addUniformTypeModalLabel">添加工装类型</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="add-uniform-type-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="uniform-type-name" class="form-label">工装类型名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="uniform-type-name" placeholder="请输入工装类型名称" required>
                        </div>
                        <div class="mb-3">
                            <label for="uniform-type-description" class="form-label">描述</label>
                            <textarea class="form-control" id="uniform-type-description" rows="3" placeholder="请输入工装类型描述"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                        <button type="submit" class="btn btn-primary">确定添加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- 工装历史模态框 -->
    <div class="modal fade" id="uniform-history-modal" tabindex="-1" aria-labelledby="uniformHistoryModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="uniformHistoryModalLabel">工装领取历史</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4">
                        <h4>员工信息</h4>
                        <p><strong>姓名:</strong> <span id="history-employee-name"></span></p>
                        <p><strong>工号:</strong> <span id="history-employee-id"></span></p>
                    </div>
                    <div>
                        <h4>工装领取记录</h4>
                        <div id="uniform-history-list">
                            <!-- 历史记录将通过JavaScript动态加载 -->
                            <p class="text-center">加载中...</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 成功消息提示 -->
    <div class="toast text-white bg-success" id="success-toast">
        <div class="d-flex">
            <div class="toast-body">
                操作成功
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    
    <!-- 错误消息提示 -->
    <div class="toast text-white bg-danger" id="error-toast">
        <div class="d-flex">
            <div class="toast-body">
                操作失败
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 员工工装管理脚本 -->
    <script src="/static/js/employee_uniform.js"></script>
</body>
</html>
