<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>查看所有用户</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
        h1 { color: #333; }
        .section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .user-list { columns: 3; }
        .user-item { padding: 5px; }
        .search { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>数据库中的所有用户</h1>
    
    <div class="section">
        <h2>操作</h2>
        <button onclick="loadUsers()">加载用户列表</button>
        <input type="text" id="search" class="search" placeholder="搜索用户..." oninput="filterUsers()">
    </div>
    
    <div class="section">
        <h2>用户列表</h2>
        <div class="user-list" id="user-list">
            <p>点击"加载用户列表"按钮...</p>
        </div>
    </div>
    
    <div class="section">
        <h2>找到的用户数</h2>
        <p id="count">0</p>
    </div>
    
    <script>
        let allUsers = [];
        
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) throw new Error('获取用户列表失败');
                const data = await response.json();
                allUsers = data.users || [];
                renderUsers(allUsers);
                document.getElementById('count').textContent = allUsers.length + ' 个用户';
            } catch (e) {
                alert('加载失败: ' + e.message);
            }
        }
        
        function renderUsers(users) {
            const listDiv = document.getElementById('user-list');
            listDiv.innerHTML = users.map(u => 
                `<div class="user-item">${u.id}: <strong>${u.username}</strong></div>`
            ).join('');
        }
        
        function filterUsers() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.username.toLowerCase().includes(query)
            );
            renderUsers(filtered);
            document.getElementById('count').textContent = filtered.length + ' 个用户';
        }
        
        // 自动加载
        window.onload = loadUsers;
    </script>
</body>
</html>
