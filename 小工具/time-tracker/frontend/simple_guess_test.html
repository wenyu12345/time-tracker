<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简化版猜数字游戏测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .game-status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            background-color: #e9ecef;
            text-align: center;
            font-size: 18px;
        }
        .status-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        .game-input {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .game-input input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .game-input button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
        }
        .game-input button:hover {
            background-color: #0056b3;
        }
        .game-info {
            margin: 20px 0;
            text-align: center;
        }
        .guess-history {
            margin: 20px 0;
            text-align: center;
        }
        .guess-history-item {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        .correct {
            background-color: #28a745;
            color: white;
        }
        .high {
            background-color: #dc3545;
            color: white;
        }
        .low {
            background-color: #17a2b8;
            color: white;
        }
        .console {
            margin-top: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
        }
        .console h3 {
            margin-top: 0;
            color: #333;
        }
        .console-line {
            margin: 5px 0;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .console-debug {
            background-color: #e3f2fd;
            color: #1565c0;
        }
        .console-info {
            background-color: #e8f5e8;
            color: #2e7d32;
        }
        .console-error {
            background-color: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>简化版猜数字游戏</h1>
        
        <div class="game-info">
            <p>系统随机生成1-100之间的整数，请在下方输入框中提交猜测的数字。</p>
            <p>你有6次机会猜测，每次猜测后系统会提示"猜大了"或"猜小了"。</p>
        </div>
        
        <div class="game-status">
            <div class="status-message info" id="guess-status">游戏未开始，请点击"开始新游戏"按钮。</div>
            <div>剩余猜测次数：<span id="remaining-guesses">6</span>/6</div>
        </div>
        
        <div class="game-input">
            <input type="number" id="guess-input" placeholder="请输入1-100之间的数字" min="1" max="100">
            <button id="submit-guess-btn">提交猜测</button>
            <button id="new-guess-game-btn">开始新游戏</button>
        </div>
        
        <div class="guess-history">
            <h4>历史猜测记录</h4>
            <div id="guess-history" class="guess-history"></div>
        </div>
        
        <div class="console">
            <h3>调试控制台</h3>
            <div id="debug-console"></div>
        </div>
    </div>
    
    <script>
        // 简单的调试日志函数
        function log(message, type = 'debug') {
            const consoleDiv = document.getElementById('debug-console');
            const logLine = document.createElement('div');
            logLine.className = `console-line console-${type}`;
            logLine.textContent = `${new Date().toLocaleTimeString()} - ${message}`;
            consoleDiv.appendChild(logLine);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            // 同时输出到浏览器控制台
            console[type](message);
        }
        
        // 游戏状态
        let gameState = {
            targetNumber: 0,
            remainingGuesses: 6,
            maxGuesses: 6,
            gameStarted: false,
            gameCompleted: false,
            guessHistory: []
        };
        
        // 更新游戏状态显示
        function updateGameStatus(message, type = 'info') {
            const statusElement = document.getElementById('guess-status');
            if (statusElement) {
                statusElement.textContent = message;
                statusElement.className = `status-message ${type}`;
            }
        }
        
        // 更新剩余猜测次数显示
        function updateRemainingGuesses() {
            const remainingGuessesElement = document.getElementById('remaining-guesses');
            if (remainingGuessesElement) {
                remainingGuessesElement.textContent = gameState.remainingGuesses;
            }
        }
        
        // 更新猜测历史显示
        function updateGuessHistory() {
            const guessHistoryElement = document.getElementById('guess-history');
            if (!guessHistoryElement) return;
            
            // 清空历史记录
            guessHistoryElement.innerHTML = '';
            
            // 生成历史记录项
            gameState.guessHistory.forEach(guess => {
                const historyItem = document.createElement('div');
                historyItem.className = 'guess-history-item';
                
                // 设置样式
                if (guess === gameState.targetNumber) {
                    historyItem.className += ' correct';
                    historyItem.textContent = `${guess} ✓`;
                } else if (guess > gameState.targetNumber) {
                    historyItem.className += ' high';
                    historyItem.textContent = `${guess} ↑`;
                } else {
                    historyItem.className += ' low';
                    historyItem.textContent = `${guess} ↓`;
                }
                
                guessHistoryElement.appendChild(historyItem);
            });
        }
        
        // 清空猜测历史
        function clearGuessHistory() {
            const guessHistoryElement = document.getElementById('guess-history');
            if (guessHistoryElement) {
                guessHistoryElement.innerHTML = '';
            }
        }
        
        // 开始新游戏
        function startNewGame() {
            log('开始新游戏');
            
            // 重置游戏状态
            gameState = {
                targetNumber: Math.floor(Math.random() * 100) + 1, // 生成1-100之间的随机数
                remainingGuesses: 6, // 剩余猜测次数
                maxGuesses: 6, // 最大猜测次数
                gameStarted: true,
                gameCompleted: false,
                guessHistory: []
            };
            
            log(`新游戏开始，目标数字: ${gameState.targetNumber}`);
            
            // 更新游戏状态显示
            updateGameStatus('游戏已开始，请输入1-100之间的数字进行猜测。');
            updateRemainingGuesses();
            
            // 清空猜测历史
            clearGuessHistory();
            
            // 清空输入框
            const guessInput = document.getElementById('guess-input');
            if (guessInput) {
                guessInput.value = '';
                guessInput.disabled = false;
            }
        }
        
        // 处理胜利
        function handleWin() {
            log('猜中了！');
            gameState.gameCompleted = true;
            
            // 更新游戏状态
            updateGameStatus(`恭喜你，猜对了！目标数字是 ${gameState.targetNumber}！`, 'success');
            
            // 禁用输入框
            const guessInput = document.getElementById('guess-input');
            if (guessInput) {
                guessInput.disabled = true;
            }
        }
        
        // 处理失败
        function handleLose() {
            log('猜测次数用完了');
            gameState.gameCompleted = true;
            
            // 更新游戏状态
            updateGameStatus(`很遗憾，你没有猜对。目标数字是 ${gameState.targetNumber}！`, 'error');
            
            // 禁用输入框
            const guessInput = document.getElementById('guess-input');
            if (guessInput) {
                guessInput.disabled = true;
            }
        }
        
        // 提交猜测
        function submitGuess() {
            log('提交猜测');
            log(`当前游戏状态: 开始=${gameState.gameStarted}, 完成=${gameState.gameCompleted}`);
            
            // 检查游戏是否已开始或已完成
            if (!gameState.gameStarted || gameState.gameCompleted) {
                log('游戏未开始或已结束', 'error');
                updateGameStatus('游戏未开始或已结束，请点击"开始新游戏"按钮。', 'error');
                return;
            }
            
            // 获取用户输入
            const guessInput = document.getElementById('guess-input');
            if (!guessInput) {
                log('没有找到猜测输入框', 'error');
                return;
            }
            
            const inputValue = guessInput.value;
            log(`用户输入值: ${inputValue}`);
            
            const guess = parseInt(inputValue);
            log(`转换后的猜测值: ${guess}`);
            
            // 验证输入
            if (isNaN(guess) || guess < 1 || guess > 100) {
                log(`输入验证失败: isNaN=${isNaN(guess)}, guess=${guess}`, 'error');
                updateGameStatus('请输入1-100之间的有效数字。', 'error');
                return;
            }
            
            log('输入验证通过，开始处理猜测');
            
            // 减少剩余猜测次数
            gameState.remainingGuesses--;
            log(`剩余猜测次数: ${gameState.remainingGuesses}`);
            
            // 添加到猜测历史
            gameState.guessHistory.push(guess);
            log(`猜测历史: ${gameState.guessHistory}`);
            
            // 检查猜测结果
            if (guess === gameState.targetNumber) {
                // 猜中了
                handleWin();
            } else if (gameState.remainingGuesses <= 0) {
                // 猜测次数用完了
                handleLose();
            } else {
                // 继续猜测
                const isHigh = guess > gameState.targetNumber;
                const message = isHigh ? `猜大了！还有 ${gameState.remainingGuesses} 次机会。` : `猜小了！还有 ${gameState.remainingGuesses} 次机会。`;
                log(`猜测结果: ${message}`);
                updateGameStatus(message, isHigh ? 'error' : 'info');
            }
            
            // 更新剩余猜测次数显示
            updateRemainingGuesses();
            
            // 更新猜测历史显示
            updateGuessHistory();
            
            // 清空输入框
            guessInput.value = '';
            log('提交猜测完成');
        }
        
        // 绑定事件监听器
        function bindEvents() {
            log('绑定事件监听器');
            
            // 开始新游戏按钮
            const newGameBtn = document.getElementById('new-guess-game-btn');
            if (newGameBtn) {
                newGameBtn.addEventListener('click', startNewGame);
                log('开始新游戏按钮事件绑定成功');
            }
            
            // 提交猜测按钮
            const submitGuessBtn = document.getElementById('submit-guess-btn');
            if (submitGuessBtn) {
                submitGuessBtn.addEventListener('click', submitGuess);
                log('提交猜测按钮事件绑定成功');
            }
            
            // 输入框回车事件
            const guessInput = document.getElementById('guess-input');
            if (guessInput) {
                guessInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        log('回车键被按下');
                        submitGuess();
                    }
                });
                log('输入框回车事件绑定成功');
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            log('页面加载完成，初始化游戏');
            bindEvents();
        });
    </script>
</body>
</html>
